name: Deploy API to VPS

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download API package
        uses: actions/download-artifact@v4
        with:
          name: api-package

      - name: Setup SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<END
          Host deploy-vps
            HostName ${{ secrets.HOST }}
            User deploy
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          END

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@v6.0.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: "deploy"
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: "api"
          TARGET: "/opt/api/releases/${{ github.run_number }}/"
          ARGS: "-rlgoDzvc"
          EXCLUDE: ""

      - name: Switch and restart
        run: |
          ssh deploy-vps "            
            rm -f /opt/api/current
            ln -s /opt/api/releases/${{ github.run_number }} /opt/api/current            
            chmod +x /opt/api/current/api
            sudo systemctl restart api
          "

      - name: Health check
        id: health
        run: |
          ssh deploy-vps "
            for i in {1..10}; do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo 'Health check passed'
                exit 0
              fi
              echo 'Waiting for API... attempt \$i/10'
              sleep 2
            done
            echo 'Health check failed'
            exit 1
          " && echo "RELEASE_SUCCESS=true" >> $GITHUB_OUTPUT || (echo "RELEASE_SUCCESS=false" >> $GITHUB_OUTPUT && exit 1)

      - name: Save successful release
        if: success()
        run: |
          ssh deploy-vps "
            echo '${{ github.run_number }}' > /opt/api/.last_successful
          "

      - name: Rollback
        if: failure() && steps.health.outputs.RELEASE_SUCCESS != 'true'
        run: |
          ssh deploy-vps "
            PREV=\$(cat /opt/api/.last_successful 2>/dev/null || echo '${{ github.run_number }}')
            if [ -d /opt/api/releases/\$PREV ]; then
              ln -sfn /opt/api/releases/\$PREV /opt/api/current
              systemctl restart api
              echo 'Rolled back to release \$PREV'
            fi
          "
